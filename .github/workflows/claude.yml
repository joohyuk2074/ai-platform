name: Claude Code

# Workflow for handling @claude mentions in issues and PRs
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Custom prompt to instruct Claude to create a PR after completing the task
          prompt: |
            ${{ github.event.comment.body || github.event.issue.body }}

            IMPORTANT: After completing the requested task:
            1. Create a new branch from main (use format: work/issue-${{ github.event.issue.number }}-description)
            2. Commit your changes with descriptive commit messages
            3. Push the branch to origin
            4. Create a Pull Request using 'gh pr create' with:
               - Title following the PR template convention
               - Body that includes the PR template sections (작업 내용, 고민이 되었던 부분, 리뷰 요구사항)
               - Reference to this issue (#${{ github.event.issue.number }})

            Use the repository's CLAUDE.md and PR template for guidance.

          # Allow Claude to use git and gh commands for PR creation
          claude_args: '--allowed-tools "Bash(git:*),Bash(gh pr:*),Bash(gh issue:*)"'

