server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:datahub}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:datahub_user}
    password: ${DB_PASSWORD:datahub_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: ${SHOW_SQL:false}
        # Batch 처리 설정 (N+1 문제 해결)
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      linger-ms: 5
    consumer:
      group-documentId: ${KAFKA_CONSUMER_GROUP_ID:datahub-consumer}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

kafka:
  topic:
    transform-document: ${KAFKA_TOPIC_TRANSFORM_DOCUMENT:document.transform.requested}
#    passage-creation: ${KAFKA_TOPIC_PASSAGE_CREATION:passage-creation}
#    document-transform-result: ${KAFKA_TOPIC_DOCUMENT_TRANSFORM_RESULT:document-transform-result}